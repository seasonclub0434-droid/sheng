<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绳话</title>
    <link rel="stylesheet" href="./styles.css?v=settings-logo-gear-1" />
  </head>
  <body>
    <main class="workspace">
      <section class="phone kraft-paper home-mode" aria-label="绳话预览">
        <canvas id="ropeCanvas" class="rope-canvas"></canvas>

        <section id="homePage" class="home-page" aria-label="我的绳">
          <h1 class="home-title"><span>我的绳</span></h1>
          <div id="ropeShelf" class="rope-shelf" aria-label="绳子列表"></div>
          <div class="home-control-bar" aria-label="主页操作">
            <button id="settingsToggle" class="settings-toggle" type="button" aria-expanded="false" aria-controls="settingsDock" aria-label="打开设置">
              <span class="settings-toggle-mark control-icon settings-gear-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.1-1.64c.18-.14.23-.4.11-.61l-2-3.46c-.12-.21-.36-.3-.58-.21l-2.49 1a7.2 7.2 0 0 0-1.69-.98L14.5 2.48A.49.49 0 0 0 14 2h-4c-.24 0-.44.17-.49.41l-.38 2.65c-.61.23-1.18.56-1.69.98l-2.49-1a.48.48 0 0 0-.58.21l-2 3.46c-.12.21-.07.47.11.61l2.1 1.64c-.04.32-.08.65-.08.99s.03.67.08.99l-2.1 1.64a.49.49 0 0 0-.11.61l2 3.46c.12.21.36.3.58.21l2.49-1c.51.4 1.08.73 1.69.98l.38 2.65c.05.24.25.41.49.41h4c.24 0 .44-.17.49-.41l.38-2.65c.61-.25 1.18-.58 1.69-.98l2.49 1c.22.08.46 0 .58-.21l2-3.46a.49.49 0 0 0-.11-.61l-2.1-1.64ZM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z" />
                </svg>
              </span>
            </button>
            <button id="addRopeAction" class="add-rope-action" type="button" aria-label="添加绳">
              <span class="add-rope-ring" aria-hidden="true"></span>
              <span class="add-rope-plus" aria-hidden="true">+</span>
            </button>
            <button id="homeSearchToggle" class="timeline-toggle home-search-toggle" type="button" aria-expanded="false" aria-controls="globalSearchDock" aria-label="打开搜索">
              <span class="timeline-toggle-mark control-icon search-icon" aria-hidden="true"></span>
            </button>
          </div>
        </section>

        <div id="statsBar" class="stats-bar" aria-live="polite"></div>
        <button id="backHomeAction" class="back-home-action" type="button">返回</button>

        <aside id="settingsDock" class="settings-dock" aria-label="设置" aria-hidden="true">
          <div class="dock-rail">
            <span class="settings-title">设置</span>
            <button id="settingsClose" class="dock-close" type="button" aria-label="收起设置">×</button>
          </div>
          <div class="settings-list">
            <div class="drawer-hint">点 × 收起，重置前会再确认。</div>
            <button id="resetPreviewAction" class="settings-action reset-preview-action" type="button">
              <span class="settings-action-label">重置预览</span>
              <span class="settings-action-hint">清空本机记录，回到空柜子</span>
            </button>
            <div id="resetConfirmPanel" class="reset-confirm-panel hidden">
              <div class="reset-confirm-copy">确认后会清空本机保存的绳、结、印记和选中状态。</div>
              <div class="reset-confirm-actions">
                <button id="cancelResetAction" class="text-button" type="button">取消</button>
                <button id="confirmResetAction" class="ink-button" type="button">确认重置</button>
              </div>
            </div>
          </div>
        </aside>

        <button id="timelineToggle" class="timeline-toggle" type="button" aria-expanded="false" aria-controls="recordTimelineDock" aria-label="打开绳历">
          <span class="timeline-toggle-mark">绳历</span>
        </button>

        <aside id="recordTimelineDock" class="record-timeline-dock" aria-label="记录时间轴" aria-hidden="true">
          <div class="dock-rail">
            <span class="record-timeline-title">绳历</span>
            <button id="timelineClose" class="dock-close" type="button" aria-label="收起绳历">×</button>
          </div>
          <div class="record-timeline-body">
            <div class="drawer-hint timeline-hint">点日期会圈住绳上的位置，再点一次取消。</div>
            <div id="recordTimelineList" class="record-timeline-list" role="list"></div>
          </div>
        </aside>

        <section id="exchangeDock" class="exchange-dock" aria-label="记绳操作">
          <div id="exchangeTray" class="exchange-tray" aria-hidden="true">
            <button id="writeKnotAction" class="exchange-action write-action" type="button">
              <span class="action-label">写一个结</span>
              <span class="action-hint">把没说完的话系上</span>
            </button>
            <button id="resolveKnotAction" class="exchange-action resolve-action" type="button">
              <span class="action-label">解一个结</span>
              <span class="action-hint">翻开最近的未解</span>
            </button>
            <button id="notebookAction" class="exchange-action notebook-action" type="button">
              <span class="action-label">翻绳本</span>
              <span class="action-hint">回看已解的结和挂上的印章</span>
            </button>
          </div>
          <button id="exchangeButton" class="exchange-button" type="button" aria-expanded="false" aria-controls="exchangeTray">
            <span class="exchange-mark">记绳</span>
            <span class="exchange-sub">翻开纸签</span>
          </button>
        </section>

        <div id="modalLayer" class="modal-layer hidden" role="presentation">
          <section id="ropeNameCard" class="paper-card hidden" aria-label="给绳子命名">
            <div class="card-title">给这根绳命名</div>
            <div class="card-meta">写在便签上的名字，会贴到柜子的收纳格上。</div>
            <input id="ropeNameInput" class="rope-name-input" maxlength="12" placeholder="比如：周末绳" />
            <div class="card-actions">
              <button id="cancelRopeName" class="text-button" type="button">先不放</button>
              <button id="saveRopeName" class="ink-button" type="button">放进柜子</button>
            </div>
          </section>

          <section id="noteCard" class="paper-card hidden" aria-label="写成一个结">
            <div class="card-title">写成一个结</div>
            <textarea id="noteInput" class="note-input" maxlength="500" placeholder="发生了什么"></textarea>
            <div class="card-actions">
              <button id="cancelNote" class="text-button" type="button">先不写</button>
              <button id="saveNote" class="ink-button" type="button">完成</button>
            </div>
          </section>

          <section id="detailCard" class="paper-card hidden" aria-label="绳结详情">
            <div id="detailTitle" class="card-title"></div>
            <div id="detailMeta" class="card-meta"></div>
            <div id="detailContent" class="detail-content"></div>
            <div id="resolutionBlock" class="resolution-lines hidden"></div>
            <div id="resolveForm" class="resolve-form hidden">
              <textarea id="resolveInput" class="resolve-input" maxlength="80" placeholder="留一句和解的话"></textarea>
            </div>
            <div class="card-actions">
              <button id="closeDetail" class="text-button" type="button">收起</button>
              <button id="resolveAction" class="ink-button hidden" type="button"></button>
              <button id="submitResolve" class="ink-button hidden" type="button">写好</button>
            </div>
          </section>

          <section id="notebookCard" class="paper-card hidden" aria-label="绳本">
            <div class="notebook-title-row">
              <div class="card-title">绳本</div>
              <label class="notebook-search-wrap" aria-label="搜索绳本">
                <span class="notebook-search-icon">⌕</span>
                <input id="notebookSearch" class="notebook-search" type="search" placeholder="搜索" />
              </label>
            </div>
            <div class="card-meta">解开的结、留下的印记和印章</div>
            <div id="notebookList" class="notebook-list" role="list"></div>
            <div class="card-actions">
              <button id="closeNotebook" class="ink-button" type="button">收好</button>
            </div>
          </section>
        </div>
      </section>

      <aside id="globalSearchDock" class="record-timeline-dock global-search-dock" aria-label="全局搜索" aria-hidden="true">
        <div class="dock-rail">
          <span class="record-timeline-title">搜索</span>
          <button id="globalSearchClose" class="dock-close" type="button" aria-label="收起搜索">×</button>
        </div>
        <div class="global-search-body">
          <label class="global-search-box" aria-label="全局搜索">
            <span>⌕</span>
            <input id="globalSearchInput" type="search" placeholder="搜所有绳" />
          </label>
          <div id="globalSearchList" class="global-search-list" role="list"></div>
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js?v=settings-logo-gear-1"></script>
  </body>
</html>
